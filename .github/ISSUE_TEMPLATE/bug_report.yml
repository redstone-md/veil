name: Bug report
description: Report a defect in Veil
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        **If you believe this is a security vulnerability, do NOT file
        a public issue.** Follow the disclosure process in
        [SECURITY.md](../../SECURITY.md) instead.
  - type: input
    id: version
    attributes:
      label: Veil version
      description: Output of `veil version`
      placeholder: "veil v0.1.0 (commit abc1234)"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system and version
      placeholder: "Ubuntu 24.04 / Windows 11 / macOS 14"
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: Component
      options:
        - core / server
        - core / client
        - installer (GUI)
        - desktop client
        - mobile client (Android)
        - mobile client (iOS)
        - SDK / language binding
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the actual behaviour.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered, minimal, deterministic.
      placeholder: |
        1. Run `veil serve --config X`
        2. Run `veil connect --config Y`
        3. Observe error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste logs here. **Redact private keys, full IPs, and any other sensitive data.**
      render: text
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: I have not included private keys, full client/server IPs, or other sensitive material.
          required: true
