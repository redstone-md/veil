name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  core-lint:
    name: core / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache: true
          cache-dependency-path: core/go.sum
      - name: go vet
        working-directory: core
        run: go vet ./...
      - name: gofmt check
        working-directory: core
        run: |
          set -e
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          working-directory: core
          args: --timeout=5m

  core-test:
    name: core / test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache: true
          cache-dependency-path: core/go.sum
      - name: go test
        working-directory: core
        run: go test -race -count=1 ./...

  core-build:
    name: core / build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [core-lint, core-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache: true
          cache-dependency-path: core/go.sum
      - name: build
        working-directory: core
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags "-s -w" \
            -o ../dist/veil-${{ matrix.target }}${{ matrix.ext }} \
            ./cmd/veil
      - uses: actions/upload-artifact@v4
        with:
          name: veil-${{ matrix.target }}
          path: dist/veil-${{ matrix.target }}${{ matrix.ext }}
          retention-days: 7

  vulncheck:
    name: vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache: true
          cache-dependency-path: core/go.sum
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        working-directory: core
        run: govulncheck ./...
