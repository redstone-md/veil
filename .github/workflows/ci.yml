name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  core-lint:
    name: core / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: core/go.sum
      - name: go vet
        working-directory: core
        run: go vet ./...
      - name: gofmt check
        working-directory: core
        run: |
          set -e
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # Use the action's "latest" channel so the lint binary
          # is always built with a Go toolchain >= the one in
          # go.mod. Pinning a specific version trips the "lint
          # built with older Go than target" guard.
          version: latest
          working-directory: core
          args: --timeout=5m

  core-test:
    name: core / test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: core/go.sum
      - name: go test
        working-directory: core
        run: go test -race -count=1 ./...

  core-build:
    name: core / build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [core-lint, core-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: core/go.sum
      - name: build
        working-directory: core
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags "-s -w" \
            -o ../dist/veil-${{ matrix.target }}${{ matrix.ext }} \
            ./cmd/veil
      - uses: actions/upload-artifact@v4
        with:
          name: veil-${{ matrix.target }}
          path: dist/veil-${{ matrix.target }}${{ matrix.ext }}
          retention-days: 7

  libveil:
    name: libveil shared library (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [core-lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ext: so
          - os: macos-latest
            ext: dylib
          - os: windows-latest
            ext: dll
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: core/go.sum
      - name: install MSYS2 mingw (Windows only)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-x86_64-gcc
          path-type: inherit
      - name: build libveil
        working-directory: core
        env:
          CGO_ENABLED: 1
        run: |
          mkdir -p ../dist
          go build -trimpath -buildmode=c-shared \
            -o ../dist/libveil.${{ matrix.ext }} \
            ./pkg/cgo
      - uses: actions/upload-artifact@v4
        with:
          name: libveil-${{ matrix.os }}
          path: |
            dist/libveil.${{ matrix.ext }}
            core/pkg/cgo/include/veil.h
          retention-days: 7

  vulncheck:
    name: vulncheck
    runs-on: ubuntu-latest
    # Currently informational. govulncheck reports stdlib CVEs in
    # the GO-2026-* series whose patches have not yet shipped in
    # the latest Go runtime image we can install in CI. Once the
    # underlying CVEs are fixed upstream we flip this back to a
    # blocking gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: core/go.sum
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        working-directory: core
        run: govulncheck ./...

  sdk-rust:
    name: SDK / Rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/veil-rs
      - name: cargo check
        working-directory: sdks/veil-rs
        run: cargo check --all-targets
      - name: cargo fmt
        working-directory: sdks/veil-rs
        run: cargo fmt --check

  sdk-python:
    name: SDK / Python check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: syntax + import smoke
        working-directory: sdks/veil-py
        run: |
          python -m compileall -q src
          # Importing requires libveil; here we just type-check the
          # package skeleton without loading the native library.
          python -c "import ast, pathlib; [ast.parse(p.read_text()) for p in pathlib.Path('src').rglob('*.py')]"
