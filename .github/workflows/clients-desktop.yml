name: Desktop client

# Tag-triggered cross-platform Tauri build for clients/desktop/.
# Mirrors installer.yml's per-platform matrix but produces the
# end-user VPN client bundles (Veil.app / Veil_*-setup.exe / *.AppImage)
# rather than the server-setup wizard.
#
# Tag-triggered ONLY — same CI quota reasoning as installer.yml. The
# manifest job at the bottom aggregates per-platform .sig files into
# the `latest.json` that the in-app updater (tauri-plugin-updater)
# polls; without this manifest the auto-update flow never sees a
# new version.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # release uploads

jobs:
  build:
    name: build / desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_SIGNING_IDENTITY != '' }}
      HAS_WIN_SIGNING:   ${{ secrets.WINDOWS_CERTIFICATE != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            # GNU/clang linkers expand `-lveil` to `libveil.so`. Naming
            # the cgo output without the `lib` prefix breaks cargo's
            # link step before tauri-bundler ever runs.
            libveil_name: libveil.so
            artifact_glob: |
              clients/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              clients/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
              clients/desktop/src-tauri/target/release/bundle/deb/*.deb
          - os: macos-latest
            target: darwin-arm64
            libveil_name: libveil.dylib
            artifact_glob: |
              clients/desktop/src-tauri/target/release/bundle/dmg/*.dmg
              clients/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
              clients/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          - os: windows-latest
            target: windows-amd64
            # MSVC convention is bare `veil.dll`; the matching `veil.lib`
            # import lib is generated below by gendef + dlltool.
            libveil_name: veil.dll
            artifact_glob: |
              clients/desktop/src-tauri/target/release/bundle/msi/*.msi
              clients/desktop/src-tauri/target/release/bundle/nsis/*.exe
              clients/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: core/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/desktop/src-tauri

      # Linux Tauri host needs WebKit2GTK + libsoup + appindicator. Same
      # set installer.yml uses; kept inline so the two workflows can
      # diverge without one breaking the other on a runner image bump.
      - name: install Tauri Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: install MSYS2 mingw (Windows libveil cgo)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-x86_64-gcc
          path-type: inherit

      # Resolve metadata once so the meta information bundled into
      # libveil at build time matches the desktop bundle's version.
      - name: resolve version + commit
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF##*/}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)"  >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"  >> "$GITHUB_OUTPUT"

      # libveil must exist at sdks/veil-rs/veil.<ext> BEFORE the desktop
      # bundle build runs — Tauri's resource glob in
      # clients/desktop/src-tauri/tauri.windows.conf.json (and the macOS
      # / Linux equivalents) copies the file into the bundle. Building
      # it here keeps the desktop client's release independent from
      # release.yml's libveil step (which produces a libveil-prefixed
      # filename and lives in a different artifact namespace).
      - name: build libveil for this platform
        working-directory: core
        shell: bash
        env:
          CGO_ENABLED: 1
        run: |
          mkdir -p ../sdks/veil-rs
          go build -trimpath -buildvcs=false -buildmode=c-shared \
            -ldflags "-s -w \
              -X github.com/redstone-md/veil/core/internal/buildinfo.Version=${{ steps.meta.outputs.version }} \
              -X github.com/redstone-md/veil/core/internal/buildinfo.Commit=${{ steps.meta.outputs.commit }} \
              -X github.com/redstone-md/veil/core/internal/buildinfo.Date=${{ steps.meta.outputs.date }}" \
            -o ../sdks/veil-rs/${{ matrix.libveil_name }} \
            ./pkg/cgo
          ls -la ../sdks/veil-rs/

      # Windows needs an MSVC import lib (`veil.lib`) so the Rust crate
      # can link against the dll. Generate it from the freshly-built
      # DLL using llvm's dlltool (mingw-w64 ships gendef + dlltool).
      - name: generate Windows import lib
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd sdks/veil-rs
          gendef veil.dll
          dlltool -d veil.def -l veil.lib

      - name: install JS deps
        working-directory: clients/desktop
        run: npm ci || npm install

      # ---- Optional installer codesigning -----------------------
      # Mirrors installer.yml. Each secret is opt-in; missing
      # secrets fall back to an unsigned installer (still has the
      # Tauri updater Ed25519 signature for the auto-update path).

      - name: prep macOS keychain (signing)
        if: runner.os == 'macOS' && env.HAS_APPLE_SIGNING == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASS=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASS" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" build.keychain
          rm -f /tmp/cert.p12

      - name: prep Windows cert (signing)
        if: runner.os == 'Windows' && env.HAS_WIN_SIGNING == 'true'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        shell: bash
        run: |
          echo "$WINDOWS_CERTIFICATE" | base64 --decode > /tmp/cert.pfx
          echo "TAURI_WIN_CERT_PATH=/tmp/cert.pfx" >> "$GITHUB_ENV"

      - name: tauri build (signed, macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_SIGNING == 'true'
        working-directory: clients/desktop
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build -- --ci

      - name: tauri build (signed, Windows)
        if: runner.os == 'Windows' && env.HAS_WIN_SIGNING == 'true'
        working-directory: clients/desktop
        env:
          TAURI_WIN_CERT_PATH: ${{ env.TAURI_WIN_CERT_PATH }}
          TAURI_WIN_CERT_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: npm run tauri:build -- --ci

      # The "unsigned" path here is misnamed in installer.yml — the
      # Ed25519 updater key still signs the artefact (creating the
      # .sig file the manifest job needs). Only the OS code-sign step
      # is skipped.
      - name: tauri build (no OS codesign)
        if: |
          (runner.os == 'macOS' && env.HAS_APPLE_SIGNING != 'true') ||
          (runner.os == 'Windows' && env.HAS_WIN_SIGNING != 'true') ||
          runner.os == 'Linux'
        working-directory: clients/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: npm run tauri:build -- --ci

      - uses: actions/upload-artifact@v4
        with:
          name: veil-desktop-${{ matrix.target }}
          path: |
            ${{ matrix.artifact_glob }}
          retention-days: 7
          if-no-files-found: warn

      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: false

  manifest:
    name: Generate latest.json updater manifest
    needs: build
    runs-on: ubuntu-latest
    # `if: always()` so the manifest still publishes when one of the
    # platform legs flakes (e.g. macOS sometimes hits a transient
    # codesign cert error). The downstream jq is already tolerant of
    # missing per-platform .sig files; partial coverage beats no
    # auto-update at all.
    if: |
      always() &&
      needs.build.result != 'cancelled' &&
      startsWith(github.ref, 'refs/tags/v')
    steps:
      # fetch-depth: 0 + tags so `git tag -l --format='%(contents)'`
      # below can read the annotated-tag body. Without these flags
      # only the bare commit SHA is checked out and the tag's
      # message resolves to empty (which then falls through to the
      # commit summary — see the alpha.5 release notes which showed
      # the fix-commit message instead of the alpha.5 tag body).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4
        with:
          path: bundles

      - name: build latest.json from per-platform .sig files
        id: build
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF##*/}"
          # Strip leading v so the body matches the version field
          # tauri-plugin-updater compares against (it tolerates both
          # but the manifest convention is a bare semver).
          NUMERIC="${VERSION#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Pull the tag annotation as the release notes body. Falls
          # back to a generic message on lightweight tags.
          NOTES="$(git tag -l --format='%(contents)' "$VERSION" || true)"
          if [ -z "$NOTES" ]; then
            NOTES="Update available."
          fi

          # Locate per-platform signed bundles + matching .sig files.
          # The asset URLs follow GitHub's stable per-tag scheme so we
          # don't need to re-upload the bundles here.
          REPO="${GITHUB_REPOSITORY}"
          base_url="https://github.com/${REPO}/releases/download/${VERSION}"

          win_setup_sig="$(find bundles -type f -name '*-setup.exe.sig' | head -1)"
          win_setup_url=""
          if [ -n "$win_setup_sig" ]; then
            win_bundle="$(basename "${win_setup_sig%.sig}")"
            win_setup_url="${base_url}/${win_bundle}"
          fi

          mac_sig="$(find bundles -type f -name '*.app.tar.gz.sig' | head -1)"
          mac_url=""
          if [ -n "$mac_sig" ]; then
            mac_bundle="$(basename "${mac_sig%.sig}")"
            mac_url="${base_url}/${mac_bundle}"
          fi

          linux_sig="$(find bundles -type f -name '*.AppImage.sig' | head -1)"
          linux_url=""
          if [ -n "$linux_sig" ]; then
            linux_bundle="$(basename "${linux_sig%.sig}")"
            linux_url="${base_url}/${linux_bundle}"
          fi

          # Construct the manifest. Each platform block is included
          # only when its .sig file landed — partial releases (e.g.
          # macOS leg failed) still produce a valid manifest for the
          # platforms that did build.
          jq -n \
            --arg version "$NUMERIC" \
            --arg notes "$NOTES" \
            --arg pub "$PUB_DATE" \
            --arg win_sig  "$( [ -n "$win_setup_sig" ] && cat "$win_setup_sig" || echo '' )" \
            --arg win_url  "$win_setup_url" \
            --arg mac_sig  "$( [ -n "$mac_sig" ] && cat "$mac_sig" || echo '' )" \
            --arg mac_url  "$mac_url" \
            --arg linux_sig "$( [ -n "$linux_sig" ] && cat "$linux_sig" || echo '' )" \
            --arg linux_url "$linux_url" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub,
              platforms: (
                ( if $win_sig != "" then {"windows-x86_64": {signature: $win_sig, url: $win_url}} else {} end ) +
                ( if $mac_sig != "" then {"darwin-aarch64": {signature: $mac_sig, url: $mac_url}} else {} end ) +
                ( if $linux_sig != "" then {"linux-x86_64": {signature: $linux_sig, url: $linux_url}} else {} end )
              )
            }' > latest.json
          cat latest.json

      - name: attach manifest to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          fail_on_unmatched_files: true
