name: Installer

# Cross-platform Tauri installer build matrix.
#
# Triggered on every push to main (smoke) and on version tags
# (release). Tag runs upload the bundled artefacts to the matching
# GitHub Release; main-branch runs upload them as 7-day artefacts so
# contributors can grab a build without waiting for the next tag.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "installer/**"
      - ".github/workflows/installer.yml"
  workflow_dispatch: {}

permissions:
  contents: write   # release uploads

jobs:
  build:
    name: build / installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact_glob: |
              installer/src-tauri/target/release/bundle/appimage/*.AppImage
              installer/src-tauri/target/release/bundle/deb/*.deb
          - os: macos-latest
            target: darwin-arm64
            artifact_glob: |
              installer/src-tauri/target/release/bundle/dmg/*.dmg
              installer/src-tauri/target/release/bundle/macos/*.app
          - os: windows-latest
            target: windows-amd64
            artifact_glob: |
              installer/src-tauri/target/release/bundle/msi/*.msi
              installer/src-tauri/target/release/bundle/nsis/*.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: installer/src-tauri

      # Linux: tauri-build needs webkit2gtk + libsoup + ssl headers
      # to compile the Rust host. The exact package names changed
      # between Ubuntu releases; the list below is the GitHub
      # runners' ubuntu-24.04 set.
      - name: install Tauri Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: install JS deps
        working-directory: installer
        run: npm ci || npm install

      - name: tauri build
        working-directory: installer
        env:
          # The signing-key story is in docs/RELEASING.md; the
          # release pipeline does not yet sign the installer
          # artefacts because the macOS / Windows codesigning certs
          # are operator-supplied and out of scope for the public
          # CI workflow.
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri:build -- --ci

      - uses: actions/upload-artifact@v4
        with:
          name: veil-installer-${{ matrix.target }}
          path: |
            ${{ matrix.artifact_glob }}
          retention-days: 7
          if-no-files-found: warn

      # On a tag push, also attach the artefacts to the GitHub
      # Release. The action accepts globs and silently skips when
      # no files match (which is fine; the matrix runs on PRs too).
      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: false
