name: Installer

# Cross-platform Tauri installer build matrix.
#
# Triggered on every push to main (smoke) and on version tags
# (release). Tag runs upload the bundled artefacts to the matching
# GitHub Release; main-branch runs upload them as 7-day artefacts so
# contributors can grab a build without waiting for the next tag.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "installer/**"
      - ".github/workflows/installer.yml"
  workflow_dispatch: {}

permissions:
  contents: write   # release uploads

jobs:
  build:
    name: build / installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact_glob: |
              installer/src-tauri/target/release/bundle/appimage/*.AppImage
              installer/src-tauri/target/release/bundle/deb/*.deb
          - os: macos-latest
            target: darwin-arm64
            artifact_glob: |
              installer/src-tauri/target/release/bundle/dmg/*.dmg
              installer/src-tauri/target/release/bundle/macos/*.app
          - os: windows-latest
            target: windows-amd64
            artifact_glob: |
              installer/src-tauri/target/release/bundle/msi/*.msi
              installer/src-tauri/target/release/bundle/nsis/*.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: installer/src-tauri

      # Linux: tauri-build needs webkit2gtk + libsoup + ssl headers
      # to compile the Rust host. The exact package names changed
      # between Ubuntu releases; the list below is the GitHub
      # runners' ubuntu-24.04 set.
      - name: install Tauri Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: install JS deps
        working-directory: installer
        run: npm ci || npm install

      # ---- Optional codesigning ---------------------------------
      #
      # When the corresponding repository secrets are configured the
      # installer is signed and (for macOS) notarised. Each secret
      # is opt-in: missing secrets cause the build to fall back to
      # an unsigned artefact rather than failing.
      #
      # macOS:
      #   APPLE_CERTIFICATE        base64-encoded .p12 of the
      #                            Developer ID Application cert
      #   APPLE_CERTIFICATE_PASSWORD  passphrase for the .p12
      #   APPLE_SIGNING_IDENTITY   common name or hash of the cert
      #                            (e.g. "Developer ID Application:
      #                            Veil VPN (TEAMID)")
      #   APPLE_ID                 Apple ID for notarytool
      #   APPLE_ID_PASSWORD        app-specific password for that ID
      #   APPLE_TEAM_ID            10-char team identifier
      #
      # Windows:
      #   WINDOWS_CERTIFICATE      base64-encoded .pfx of the EV cert
      #   WINDOWS_CERTIFICATE_PASSWORD  passphrase for the .pfx
      #
      # See docs/RELEASING.md §"Signing setup" for the full operator
      # walkthrough.
      - name: prep macOS keychain (signing)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASS=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASS" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" build.keychain
          rm -f /tmp/cert.p12

      - name: prep Windows cert (signing)
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        shell: bash
        run: |
          echo "$WINDOWS_CERTIFICATE" | base64 --decode > /tmp/cert.pfx
          # Tauri picks the cert up via TAURI_WIN_CERT_PATH; a step
          # below exports it as an env var on the build step.
          echo "TAURI_WIN_CERT_PATH=/tmp/cert.pfx" >> "$GITHUB_ENV"

      # Build with signing only when the relevant secret IS set.
      # An empty APPLE_SIGNING_IDENTITY env tells tauri-bundler to
      # call codesign with an empty argument, which fails with
      # "specified item could not be found in the keychain". The
      # same logic applies to the Windows cert path. Splitting the
      # build into two steps gated by the secret presence keeps
      # the unsigned default path clean.
      - name: tauri build (signed, macOS)
        if: runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY != ''
        working-directory: installer
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build -- --ci

      - name: tauri build (signed, Windows)
        if: runner.os == 'Windows' && env.TAURI_WIN_CERT_PATH != ''
        working-directory: installer
        env:
          TAURI_WIN_CERT_PATH: ${{ env.TAURI_WIN_CERT_PATH }}
          TAURI_WIN_CERT_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: npm run tauri:build -- --ci

      - name: tauri build (unsigned)
        if: |
          (runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY == '') ||
          (runner.os == 'Windows' && env.TAURI_WIN_CERT_PATH == '') ||
          runner.os == 'Linux'
        working-directory: installer
        env:
          # Tauri auto-update signing remains opt-in; if absent it
          # is also a no-op.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: npm run tauri:build -- --ci

      - uses: actions/upload-artifact@v4
        with:
          name: veil-installer-${{ matrix.target }}
          path: |
            ${{ matrix.artifact_glob }}
          retention-days: 7
          if-no-files-found: warn

      # On a tag push, also attach the artefacts to the GitHub
      # Release. The action accepts globs and silently skips when
      # no files match (which is fine; the matrix runs on PRs too).
      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: false
