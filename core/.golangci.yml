# golangci-lint v2 configuration for the Veil core module.
# Migrated from v1 alongside the bump to a Go 1.25-compatible
# golangci-lint release.
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  # Conservative starter set: every linter we keep is here because
  # it has caught a real bug at least once. Style-only and
  # heuristic linters (revive, gosec, gocritic) produce too many
  # false positives in security-and-network-shaped code; their
  # findings are reviewed by hand on PR rather than blocked in CI.
  # gosec in particular flags every InsecureSkipVerify, every
  # math/rand pull, and every G304 path-from-config, all of which
  # are intentional in this codebase.
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - unconvert
    - misspell
  settings:
    errcheck:
      # Many Close() / Write-to-Stdout calls in cleanup paths are
      # intentionally unchecked. Whitelisting these idioms is
      # preferable to littering the codebase with `_ = x.Close()`
      # noise. See https://github.com/kisielk/errcheck for the
      # function-name syntax.
      exclude-functions:
        - (io.Closer).Close
        - (net.Listener).Close
        - (net.Conn).Close
        - (*net.TCPConn).CloseWrite
        - (*os.File).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (*database/sql.Tx).Rollback
        - (*github.com/redstone-md/veil/core/internal/users.Store).Close
        - (*github.com/redstone-md/veil/core/internal/session.Stream).Close
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - (io.Writer).Write
        - (*os.File).Write
        - (*github.com/redstone-md/veil/core/internal/transport.FanInListener).Close
        - (github.com/redstone-md/veil/core/internal/transport.Listener).Close
    misspell:
      # The codebase is written in British English (initialise,
      # serialise, behaviour, signalled). Setting the locale to UK
      # avoids ~30 false positives that would otherwise flag every
      # doc comment.
      locale: UK
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: package-comments
        - name: var-naming
        - name: indent-error-flow
        - name: error-return
        - name: error-strings
        - name: increment-decrement
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/redstone-md/veil
